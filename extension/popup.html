<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Tracker Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header>
      <h1>Log this application</h1>
      <span id="detected-badge" class="badge hidden">Auto-filled</span>
    </header>

    <form id="capture-form">
      <label>
        Company
        <input type="text" id="company" required placeholder="e.g. Razorpay" />
      </label>

      <label>
        Role
        <input type="text" id="role" required placeholder="e.g. AI/ML Engineer" />
      </label>

      <label>
        Platform
        <select id="platform">
          <option value="LinkedIn">LinkedIn</option>
          <option value="Naukri">Naukri</option>
          <option value="Internshala">Internshala</option>
          <option value="Indeed">Indeed</option>
          <option value="Company Website">Company Website</option>
          <option value="Referral">Referral</option>
          <option value="Other">Other</option>
        </select>
      </label>

      <label>
        Job posting URL
        <input type="text" id="url" placeholder="https://..." />
      </label>

      <label>
        Criteria / JD notes
        <textarea id="criteria" rows="3" placeholder="Key requirements they asked for..."></textarea>
      </label>

      <!--
        full_description and location aren't visible fields the user fills
        in - they're auto-captured by the content script and carried
        silently. full_description is too long for this small popup's UI;
        location doesn't need manual confirmation per-application since
        it's rarely wrong once captured (unlike status, which always
        needs a human decision). Both are visible/editable later on the
        dashboard if a correction is ever needed.
      -->
      <input type="hidden" id="full_description" />
      <input type="hidden" id="location" />
      <div id="description-indicator" class="description-indicator hidden">
        ✓ Full job description captured (<span id="description-length">0</span> chars)
      </div>

      <div id="status-msg" class="status-msg"></div>

      <button type="submit" id="save-btn">Save application</button>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
